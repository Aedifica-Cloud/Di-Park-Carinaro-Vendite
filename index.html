<style>
:root {
  --navy:#1a2e4a; --gold:#c9a84c; --green:#2e7d32; --red:#c62828;
  --orange:#e65100; --border:#b0a090; --bg:#f5f0e8; --card:#fff;
  --sold:#f2e0a0; --res:#b8efb8; --avail:#ffffff; --locale:#ede9f8;
  --radius:8px; --shadow:0 2px 12px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:#333;min-height:100vh;}

/* ── HEADER ── */
.header{background:var(--navy);color:#fff;padding:16px 24px;display:flex;align-items:center;gap:16px;box-shadow:var(--shadow);}
.logo{font-size:22px;font-weight:800;letter-spacing:1px;color:var(--gold);}
.logo span{color:#fff;font-weight:300;}
.saved-lbl{margin-left:auto;font-size:11px;opacity:.6;min-width:80px;text-align:right;}

/* ── TABS ── */
.tabs{background:var(--navy);border-top:1px solid rgba(255,255,255,.1);display:flex;padding:0 16px;gap:4px;}
.tab{padding:10px 20px;color:rgba(255,255,255,.55);cursor:pointer;font-size:13px;font-weight:600;border-bottom:3px solid transparent;transition:.2s;}
.tab:hover{color:#fff;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* ── KPI ── */
#kpi{display:flex;gap:12px;padding:14px 24px;background:#fff;border-bottom:1px solid #e0d8cc;flex-wrap:wrap;}
.kpi{background:var(--bg);border-radius:var(--radius);padding:10px 16px;min-width:120px;flex:1;}
.kpi.t{flex:2;display:flex;flex-direction:column;gap:6px;}
.kl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#888;}
.kv{font-size:22px;font-weight:800;color:var(--navy);}
.ks{font-size:11px;color:#888;}
.kpi.v .kv{color:var(--red);}
.kpi.r .kv{color:var(--orange);}
.kpi.d .kv{color:var(--green);}
.kpi.e .kv{font-size:16px;color:var(--navy);}
.pbar{height:8px;border-radius:4px;background:#e0d8cc;overflow:hidden;display:flex;}
.pb-v{background:var(--red);height:100%;}
.pb-r{background:var(--orange);height:100%;}
.pb-d{background:var(--green);height:100%;}

/* ── LEGEND ── */
.legend{display:flex;gap:16px;padding:10px 24px;background:#fff;border-bottom:1px solid #e0d8cc;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:#555;}
.leg-dot{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border);}
.leg-dot.venduto{background:var(--sold);}
.leg-dot.riservato{background:var(--res);}
.leg-dot.disponibile{background:var(--avail);}
.leg-dot.locale{background:var(--locale);}

/* ── CONTENT AREA ── */
#content{padding:24px;overflow-x:auto;}
.proj-title{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:20px;letter-spacing:.5px;}

/* ── FLOOR ROW ── */
.floor-row{display:flex;align-items:flex-start;gap:16px;margin-bottom:14px;}
.floor-label{min-width:110px;text-align:right;padding-top:14px;}
.fl-name{font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;}
.fl-quota{font-size:10px;color:#888;margin-top:2px;}
.floor-plan{display:flex;gap:20px;flex-wrap:wrap;}

/* ── SCALA GROUP ── */
.sc-group{display:flex;flex-direction:column;gap:4px;}
.sc-label{font-size:9px;font-weight:800;letter-spacing:1.5px;color:#aaa;text-align:center;text-transform:uppercase;}
.sc-apts{display:flex;align-items:flex-end;gap:0;}

/* ── APARTMENT SILHOUETTE ── */
.apt-wrap{display:flex;flex-direction:column;align-items:stretch;cursor:pointer;transition:filter .15s;}
.apt-wrap:hover{filter:brightness(.93);}
.apt-ext-top,.apt-ext-bot{height:10px;border:2px solid var(--border);margin:0 22%;}
.apt-ext-top{border-bottom:none;}
.apt-ext-bot{border-top:none;}
.apt-body{border:2px solid var(--border);min-height:100px;position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px 8px 28px;gap:2px;}
.apt-body::after{content:'';position:absolute;right:-8px;top:14px;width:8px;height:26px;
  border:2px solid var(--border);border-left:none;background:inherit;}
.apt-body::before{content:'';position:absolute;left:-8px;top:14px;width:8px;height:26px;
  border:2px solid var(--border);border-right:none;background:inherit;}

/* status colours */
.apt-ext-top.venduto,.apt-body.venduto,.apt-ext-bot.venduto{background:var(--sold);}
.apt-ext-top.riservato,.apt-body.riservato,.apt-ext-bot.riservato{background:var(--res);}
.apt-ext-top.disponibile,.apt-body.disponibile,.apt-ext-bot.disponibile{background:var(--avail);}
.apt-ext-top.locale,.apt-body.locale,.apt-ext-bot.locale{background:var(--locale);}

.apt-divider{width:60%;height:1px;background:var(--border);margin-bottom:4px;}
.apt-mq{font-size:8px;color:#666;text-align:center;line-height:1.2;}
.apt-owner{font-size:7.5px;font-weight:700;color:var(--navy);text-align:center;line-height:1.2;max-width:74px;word-break:break-word;}
.apt-codice{font-size:7px;font-weight:800;color:#666;text-align:center;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:1px;}
.apt-accordo{font-size:7px;color:#888;font-style:italic;text-align:center;}
.apt-ers{font-size:6.5px;font-weight:800;color:#fff;background:#c62828;border-radius:3px;padding:1px 4px;text-align:center;letter-spacing:.4px;margin-bottom:1px;}
.apt-num{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
  width:24px;height:24px;background:var(--navy);color:#fff;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:10.5px;
  font-weight:700;border:2px solid #fff;z-index:2;}
.apt-num.gold{background:var(--gold);}

/* stairwell */
.stairwell{width:34px;flex-shrink:0;border:2px solid var(--border);background:#e8e2d8;
  display:flex;align-items:center;justify-content:center;writing-mode:vertical-rl;
  font-size:7.5px;font-weight:800;letter-spacing:1.5px;color:#888;min-height:100px;}
.stairwell-h{height:34px;flex-shrink:0;border:2px solid var(--border);background:#e8e2d8;
  display:flex;align-items:center;justify-content:center;
  font-size:7.5px;font-weight:800;letter-spacing:1.5px;color:#888;width:100%;}

/* ── MODAL ── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
  align-items:center;justify-content:center;padding:16px;}
.ov.open{display:flex;}
.modal{background:#fff;border-radius:12px;width:100%;max-width:680px;max-height:92vh;
  overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);display:flex;flex-direction:column;}
.mhead{background:var(--navy);color:#fff;padding:20px 24px;border-radius:12px 12px 0 0;
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.mhead h3{font-size:16px;font-weight:800;margin-bottom:4px;}
.ms{font-size:12px;opacity:.7;}
.mhr{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge.disponibile{background:#e8f5e9;color:var(--green);}
.badge.riservato{background:#fff3e0;color:var(--orange);}
.badge.venduto{background:#ffebee;color:var(--red);}
.badge.locale{background:#ede7f6;color:#5e35b1;}
.mclose{background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;
  border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.mclose:hover{background:rgba(255,255,255,.25);}
.minfo{display:flex;flex-wrap:wrap;gap:6px;padding:12px 24px 10px;}
.mprev{display:flex;gap:10px;padding:10px 24px 14px;border-bottom:1px solid #f0e8dc;flex-wrap:wrap;}
.mprev-box{background:var(--bg);border-radius:8px;padding:8px 14px;flex:1;min-width:130px;}
.mprev-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:#999;margin-bottom:3px;}
.mprev-val{font-size:15px;font-weight:800;color:var(--navy);}
.mprev-val.gold{color:#b8860b;}
.mprev-val.delta-pos{color:var(--green);}
.mprev-val.delta-neg{color:var(--red);}
.chip{background:var(--bg);padding:4px 10px;border-radius:20px;font-size:11px;color:#555;}
.mbody{padding:20px 24px;flex:1;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg.full{grid-column:1/-1;}
.fg label{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px;}
.fg input,.fg select,.fg textarea{border:1.5px solid #ddd;border-radius:6px;padding:8px 10px;
  font-size:13px;font-family:inherit;outline:none;transition:border .2s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--navy);}
.fg textarea{resize:vertical;min-height:60px;}
.mfoot{padding:16px 24px;border-top:1px solid #f0e8dc;display:flex;align-items:center;gap:10px;justify-content:flex-end;}
#msaved{font-size:12px;color:var(--green);font-weight:700;margin-right:auto;display:none;}
.btn{padding:9px 20px;border-radius:7px;border:none;cursor:pointer;font-weight:700;font-size:13px;font-family:inherit;}
.btn-g{background:#eee;color:#555;}
.btn-g:hover{background:#ddd;}
.btn-p{background:var(--navy);color:#fff;}
.btn-p:hover{background:#243d5c;}
.btn-danger{background:#ffebee;color:var(--red);font-size:11px;padding:6px 12px;}
.btn-danger:hover{background:#ffcdd2;}

/* ── MODAL TABS ── */
.mtabs{display:flex;border-bottom:2px solid #f0e8dc;padding:0 24px;background:#faf8f5;}
.mtab{background:none;border:none;padding:10px 18px;font-size:13px;font-weight:700;
  color:#999;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;font-family:inherit;}
.mtab.active{color:var(--navy);border-bottom-color:var(--navy);}
.mtab:hover{color:var(--navy);}

/* ── SAL ── */
.sal-summary{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.sal-sbox{flex:1;min-width:120px;background:var(--bg);border-radius:8px;padding:10px 14px;}
.sal-sbox .sl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:#999;margin-bottom:3px;}
.sal-sbox .sv{font-size:16px;font-weight:800;color:var(--navy);}
.sal-sbox.inc .sv{color:#2e7d32;}
.sal-sbox.att .sv{color:#b8860b;}
.sal-table{width:100%;border-collapse:collapse;font-size:12px;}
.sal-table th{background:#f5f0e8;padding:7px 8px;text-align:left;font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:.5px;color:#888;}
.sal-table td{padding:7px 8px;border-bottom:1px solid #f0e8dc;vertical-align:middle;}
.sal-table tr:last-child td{border-bottom:none;}
.sal-table input[type=text],.sal-table input[type=date],.sal-table input[type=number]{
  border:1.5px solid #ddd;border-radius:5px;padding:4px 7px;font-size:12px;font-family:inherit;
  width:100%;box-sizing:border-box;}
.sal-table input:disabled{background:#f5f5f5;color:#555;cursor:default;}
.sal-check{width:18px;height:18px;cursor:pointer;accent-color:var(--green);}
.sal-check:disabled{cursor:default;}
.sal-del{background:#ffebee;border:none;color:var(--red);border-radius:4px;cursor:pointer;
  padding:3px 7px;font-size:11px;font-weight:700;}
.sal-del:disabled{opacity:.3;cursor:default;}
.sal-add-btn{margin-top:12px;background:#e8f0fe;color:#1a2e4a;border:1.5px solid #b0c4e8;
  border-radius:7px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.sal-add-btn:disabled{opacity:.4;cursor:default;}

/* cash flow */
.cf-wrap{background:#fff;border-radius:12px;box-shadow:var(--shadow);padding:20px 24px;}
.cf-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.cf-bar-lbl{font-size:11px;color:#666;width:80px;flex-shrink:0;}
.cf-bar-track{flex:1;background:#f0e8dc;border-radius:4px;height:20px;position:relative;overflow:hidden;}
.cf-bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px;
  font-size:10px;font-weight:700;color:#fff;white-space:nowrap;transition:width .4s;}
.cf-bar-val{font-size:11px;font-weight:700;color:var(--navy);width:100px;text-align:right;flex-shrink:0;}
.cf-client-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;
  border-bottom:1px solid #f0e8dc;gap:8px;flex-wrap:wrap;}
.cf-client-row:last-child{border-bottom:none;}
.cf-pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.cf-pill.inc{background:#e8f5e9;color:#2e7d32;}
.cf-pill.att{background:#fff8e1;color:#b8860b;}
.cf-pill.no{background:#f5f5f5;color:#999;}

/* ── DASHBOARD ── */
.dash{padding:24px;display:flex;flex-direction:column;gap:28px;}
.dash-section-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #e0d8cc;}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}
.dcard{background:#fff;border-radius:12px;box-shadow:var(--shadow);overflow:hidden;}
.dcard-head{background:var(--navy);color:#fff;padding:14px 18px;}
.dcard-head h3{font-size:15px;font-weight:800;}
.dcard-head p{font-size:11px;opacity:.6;margin-top:2px;}
.dcard-body{padding:16px 18px;display:flex;flex-direction:column;gap:10px;}
.drow{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.drow-lbl{font-size:12px;color:#666;display:flex;align-items:center;gap:6px;}
.drow-lbl .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.drow-val{font-size:14px;font-weight:800;color:var(--navy);}
.drow-val.red{color:var(--red);}
.drow-val.green{color:var(--green);}
.drow-val.orange{color:var(--orange);}
.drow-val.gold{color:#b8860b;}
.dbar-wrap{height:6px;background:#f0e8dc;border-radius:3px;overflow:hidden;margin-top:2px;}
.dbar-fill{height:100%;border-radius:3px;transition:width .4s;}
.dsep{border:none;border-top:1px solid #f0e8dc;}
.dtag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;margin-right:4px;margin-top:2px;}
.dtag.acq{background:#e3f2fd;color:#1565c0;}
.dtag.per{background:#fff3e0;color:#e65100;}
.dtag.tra{background:#f3e5f5;color:#6a1b9a;}

/* totale globale card */
.dcard.global .dcard-head{background:linear-gradient(135deg,var(--navy),#2e5084);}
.dcard.global .dcard-body{background:#fafaf8;}
.dglobal-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px;}
.dgn{background:var(--bg);border-radius:8px;padding:10px;text-align:center;}
.dgn .dgn-v{font-size:20px;font-weight:800;color:var(--navy);}
.dgn .dgn-l{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:#888;margin-top:2px;}
.dgn.v .dgn-v{color:var(--red);}
.dgn.d .dgn-v{color:var(--green);}
.dgn.r .dgn-v{color:var(--orange);}

/* ── TABELLA PREZZI ── */
.ptable-wrap{background:#fff;border-radius:12px;box-shadow:var(--shadow);overflow:hidden;}
.ptable-head{background:var(--navy);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.ptable-head h3{font-size:14px;font-weight:800;}
.ptable-head p{font-size:11px;opacity:.6;}
.ptable{width:100%;border-collapse:collapse;font-size:12px;}
.ptable thead tr{background:#f5f0e8;}
.ptable th{padding:8px 12px;text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#888;border-bottom:2px solid #e0d8cc;white-space:nowrap;}
.ptable td{padding:8px 12px;border-bottom:1px solid #f0e8dc;vertical-align:middle;}
.ptable tr:last-child td{border-bottom:none;}
.ptable tr:hover td{background:#faf7f2;}
.ptable tr.locale-row td{background:#f8f6fc;color:#888;}
.ptable .badge-sm{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;}
.ptable .badge-sm.venduto{background:#ffebee;color:var(--red);}
.ptable .badge-sm.riservato{background:#fff3e0;color:var(--orange);}
.ptable .badge-sm.disponibile{background:#e8f5e9;color:var(--green);}
.ptable .badge-sm.locale{background:#ede7f6;color:#5e35b1;}
.delta-pos{color:var(--green);font-weight:700;}
.delta-neg{color:var(--red);font-weight:700;}
.delta-nd{color:#bbb;font-style:italic;}
.ptable tfoot td{font-weight:800;background:#f5f0e8;border-top:2px solid #e0d8cc;padding:10px 12px;}


/* ── CHECK PANEL ── */
#check-panel{background:#fff;border-bottom:1px solid #e0d8cc;}
.cp-header{display:flex;align-items:center;gap:10px;padding:8px 24px;cursor:pointer;user-select:none;}
.cp-header:hover{background:#faf7f2;}
.cp-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.cp-badge.warn{background:#fff3e0;color:#e65100;}
.cp-badge.ok{background:#e8f5e9;color:#2e7d32;}
.cp-toggle{font-size:10px;color:#aaa;margin-left:auto;}
.cp-body{padding:0 24px 12px;display:none;}
.cp-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f5f0e8;cursor:pointer;font-size:12px;}
.cp-row:last-child{border-bottom:none;}
.cp-row:hover{color:var(--navy);}
.cp-pills{display:flex;gap:4px;flex-wrap:wrap;}
.cp-pill{background:#ffebee;color:#c62828;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;}

/* ── HISTORY SECTION ── */
.hsep{border:none;border-top:1px solid #f0e8dc;margin:8px 0;}
.history-wrap{padding:0 24px 20px;}
.history-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;
  color:#888;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.history-empty{font-size:12px;color:#bbb;font-style:italic;padding:8px 0;}
.hist-entry{border-left:3px solid var(--navy);padding:8px 0 8px 12px;margin-bottom:8px;position:relative;}
.hist-entry:last-child{margin-bottom:0;}
.hist-ts{font-size:10px;color:#888;font-weight:700;margin-bottom:4px;}
.hist-change{font-size:12px;color:#444;margin-bottom:2px;}
.hist-change strong{color:var(--navy);}
.hist-change .from{color:var(--red);text-decoration:line-through;font-style:italic;}
.hist-change .to{color:var(--green);font-weight:700;}
.hist-change .empty{color:#bbb;font-style:italic;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">D|PARK <span>Carinaro</span></div>
  <div style="font-size:12px;opacity:.5;margin-left:8px;">Gestionale Vendite</div>
  <div class="saved-lbl" id="saved"></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="sw('lotti')">🗺️ Lotti</div>
  <div class="tab" onclick="sw('a1')">Armonia 1</div>
  <div class="tab" onclick="sw('a2')">Armonia 2</div>
  <div class="tab" onclick="sw('passione')">Passione</div>
  <div class="tab" onclick="sw('vittoria')">Vittoria</div>
  <div class="tab" onclick="sw('equilibrio')">Equilibrio</div>
  <div class="tab" onclick="sw('sorriso')">Sorriso</div>

// ─── SUPABASE LOAD (realtime sync) ───
function applySnapshot(j) {
  if (j) {
    const flds = ['st','owner','codice','price','phone','email','date','box','notaio','notes','accordo','drive'];
    Object.keys(j).forEach(p => {
      if (!D[p]) return;
      Object.keys(j[p]).forEach(uid => {
        if (!D[p].units[uid]) return;
        const src = j[p][uid];
        flds.forEach(f => { if (src[f] !== undefined) D[p].units[uid][f] = src[f]; });
        if (Array.isArray(src.history)) D[p].units[uid].history = src.history;
        if (Array.isArray(src.sal)) D[p].units[uid].sal = src.sal;
      });
    });
  }
  const el = document.getElementById('saved');
  const t = new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
  if (el) el.textContent = '🟢 Sincronizzato ' + t;
  // re-render current view
  if (typeof proj !== 'undefined') {
    if (proj === 'riepilogo') { if(typeof renderDashboard==='function') renderDashboard(); }
    else { if(typeof renderKPI==='function') renderKPI(); if(typeof renderPlan==='function') renderPlan(); }
  }
}

function fetchState() {
  sb.from('app_state').select('data').eq('id', STATE_ID).maybeSingle()
    .then(({ data, error }) => {
      if (error) { console.error(error); const el=document.getElementById('saved'); if(el) el.textContent='🔴 Errore connessione'; return; }
      applySnapshot(data ? data.data : null);
    }, err => {
      console.error(err); const el=document.getElementById('saved'); if(el) el.textContent='🔴 Errore connessione';
    });
}

function load() {
  const el = document.getElementById('saved');
  if (el) el.textContent = 'Connessione…';
  // caricamento iniziale
  fetchState();
  // realtime: ogni modifica alla riga ricarica e riapplica (equivale al on('value') di Firebase)
  sb.channel('app_state_' + STATE_ID)
    .on('postgres_changes',
        { event: '*', schema: 'public', table: 'app_state', filter: 'id=eq.' + STATE_ID },
        () => fetchState())
    .subscribe();
}

// ─── SUPABASE STORE ───
function store() {
  const out = {};
  Object.keys(D).forEach(p => {
    out[p] = {};
    Object.keys(D[p].units).forEach(uid => {
      const u = D[p].units[uid];
      out[p][uid] = {
        st:u.st, owner:u.owner||'', codice:u.codice||'', price:u.price||'',
        phone:u.phone||'', email:u.email||'', date:u.date||'',
        box:u.box||'', notaio:u.notaio||'', notes:u.notes||'',
        accordo:u.accordo||'', drive:u.drive||'',
        history: u.history || [],
        sal: u.sal || []
      };
    });
  });
  const el = document.getElementById('saved');
  if (el) el.textContent = 'Salvataggio…';
  sb.from('app_state').upsert({ id: STATE_ID, data: out, updated_at: new Date().toISOString() })
    .then(({ error }) => {
      if (error) { if (el) el.textContent = '🔴 Errore salvataggio'; console.error(error); return; }
      const t = new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
      if (el) el.textContent = '🟢 Salvato ' + t;
    }, err => {
      if (el) el.textContent = '🔴 Errore salvataggio';
      console.error(err);
    });
}

        v = vUnits.length, r = units.filter(u=>u.st==='riservato').length,
        d = units.filter(u=>u.st==='disponibile').length;
  const loc = allUnits.filter(u=>u.st==='locale').length;
  const eurF = u => parseFloat((u.price||'').replace(/\./g,'').replace(',','.')) || 0;
  const eur = vUnits.reduce((s,u)=>s+eurF(u),0);
  // ricavi preventivati = €2500 × mq di tutte le unità
  const prevTot = Math.round(allUnits.reduce((s,u)=>s+parseSL(u.sl),0) * PRICE_PER_MQ) + calcBoxRevenue(proj);

function renderPlan() {
  const p = D[proj];
  let html = `<div class="proj-title">${p.name} &mdash; ${p.sub}</div>`;
  p.floors.forEach(floor => {
    html += `<div class="floor-row">
      <div class="floor-label"><div class="fl-name">${floor.name}</div><div class="fl-quota">${floor.quota}</div></div>
      <div class="floor-plan">`;
    floor.layout.forEach(grp => {
      const multi = floor.layout.length > 1;
      html += `<div class="sc-group">`;
      if (multi && grp.sc) html += `<div class="sc-label">SCALA ${grp.sc}</div>`;
      const isVert = false;
      html += `<div class="sc-apts">`;      
      grp.ids.forEach((uid, i) => {
        const u = p.units[uid];
        if (!u) return;
        const st = u.st, isL = st==='locale';
        const isSt = u.lbl.startsWith('S') && u.lbl.length > 1 && isNaN(u.lbl[1]);
        const w = Math.max(55, Math.round(parseSL(u.sl) * 0.75));
        const sa = grp.stairAfter !== undefined ? grp.stairAfter : 0;
        if (isVert && i===sa && grp.ids.length>1 && grp.sc)
          html += `<div class="stairwell-h">SCALA&nbsp;${grp.sc}</div>`;
        html += `<div class="apt-wrap" style="width:${isVert ? '100%' : w+'px'}" onclick="openM('${uid}')">
          <div class="apt-ext-top ${st}"></div>
          <div class="apt-body ${st}">
            <div class="apt-divider"></div>
            ${u.tipo && u.tipo.startsWith('ERS') ? `<div class="apt-ers">ERS</div>` : ''}
            ${u.codice ? `<div class="apt-codice">${u.codice}</div>` : ''}
            <div class="apt-mq">(S.L.= MQ. ${u.sl})</div>
            ${u.owner ? `<div class="apt-owner">${u.owner}</div>` : ''}
            ${u.accordo ? `<div class="apt-accordo">${u.accordo}</div>` : ''}
            ${!isL ? `<div class="apt-num${isSt?' gold':''}">${u.lbl}</div>` : ''}
          </div>
          <div class="apt-ext-bot ${st}"></div>
        </div>`;
        if (!isVert && i===sa && grp.ids.length>1 && grp.sc)
          html += `<div class="stairwell">SCALA&nbsp;${grp.sc}</div>`;
      });
      html += `</div></div>`;
    });
    html += `</div></div>`;
  });
  // Aggiungi box auto sotto Armonia 1 e sotto Vittoria
  if (proj === 'a1')         html += renderBoxAuto();
  if (proj === 'vittoria')   html += renderBoxAutoVittoria();
  if (proj === 'passione')   html += renderBoxAutoPassione();
  if (proj === 'equilibrio') html += renderBoxAutoEquilibrio();
  if (proj === 'sorriso')    html += renderBoxAutoSorriso();
  if (proj === 'audacia')    html += renderBoxAutoAudacia();
  document.getElementById('content').innerHTML = html;
}

// ── Funzione generica per rendering sezione box ──
function renderBoxSection(titolo, boxes, sezioni, projKeys) {
  const boxMap = {};
  boxes.forEach(b => boxMap[b.n] = b);

  const ownerMap = {};
  projKeys.forEach(pk => {
    if (!D[pk]) return;
    Object.values(D[pk].units).forEach(u => {
      if (u.box) {
        String(u.box).split('/').forEach(nb => {
          const n = parseInt(nb.trim());
          if (n) ownerMap[n] = u.owner || '';
        });
      }
    });
  });

  const totMq = boxes.reduce((s,b) => s + parseFloat(b.mq.replace(',','.')), 0);
  const totRev = Math.round(totMq * BOX_PRICE_PER_MQ);

  let html = `
  <div style="margin-top:32px;">
    <div class="proj-title">🅿️ ${titolo} <span style="font-size:12px;font-weight:400;color:#888;">(Piano Interrato)</span></div>
    <div style="display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap;align-items:center;">
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;"><span style="width:16px;height:16px;background:#dbeafe;border:1.5px solid #93c5fd;border-radius:3px;display:inline-block;"></span> Singolo</div>
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;"><span style="width:16px;height:16px;background:#fef9c3;border:1.5px solid #fde047;border-radius:3px;display:inline-block;"></span> Doppio</div>
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;"><span style="width:16px;height:16px;background:#dcfce7;border:1.5px solid #86efac;border-radius:3px;display:inline-block;"></span> Assegnato</div>
      <div style="margin-left:auto;background:#f0f4ff;border:1px solid #c8d8f8;border-radius:8px;padding:6px 14px;font-size:12px;color:#3a5fa0;font-weight:700;">
        ${boxes.length} box · ${totMq.toLocaleString('it-IT',{maximumFractionDigits:0})} mq totali · Rev. prev. € ${totRev.toLocaleString('it-IT')}
      </div>
    </div>`;

  sezioni.forEach(sez => {
    html += `<div style="margin-bottom:20px;">
      <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#aaa;margin-bottom:8px;">${sez.label}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">`;

      const owner    = ownerMap[n] || '';

    });

  });

  html += `</div>`;
  return html;

function sw(p) {
  proj = p;
  const keys = ['lotti','a1','a2','passione','vittoria','equilibrio','sorriso','audacia','incassi','riepilogo'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',keys[i]===p));
  const isDash  = p==='riepilogo';
  const isInc   = p==='incassi';
  const isLotti  = p==='lotti';
  document.getElementById('kpi').style.display   = (isDash||isInc||isLotti) ? 'none' : '';
  document.querySelector('.legend').style.display = (isDash||isInc||isLotti) ? 'none' : '';
  if (isDash)       { renderDashboard(); }
  else if (isInc)   { renderIncassi(); }
  else if (isLotti) { renderLotti(); }
  else              { renderKPI(); renderPlan(); renderCheckPanel(p); }
}

// ─── DASHBOARD ───
const PRICE_PER_MQ = 2000;
const BOX_PRICE_PER_MQ = 1000;
// Ricavo preventivato box per progetto
function calcBoxRevenue(proj) {
  const totA1A2 = BOXES_A1A2.reduce((s,b) => s + parseFloat(b.mq.replace(',','.')) * BOX_PRICE_PER_MQ, 0);
  if (proj === 'a1')       return Math.round(totA1A2 / 2);
  if (proj === 'a2')       return Math.floor(totA1A2 / 2);
  if (proj === 'vittoria') return Math.round(BOXES_VITTORIA.reduce((s,b) => s + parseFloat(b.mq.replace(',','.')) * BOX_PRICE_PER_MQ, 0));
  if (proj === 'passione')   return Math.round(BOXES_PASSIONE.reduce((s,b) => s + parseFloat(b.mq.replace(',','.')) * BOX_PRICE_PER_MQ, 0));
  if (proj === 'equilibrio') return Math.round(BOXES_EQUILIBRIO.reduce((s,b) => s + parseFloat(b.mq.replace(',','.')) * BOX_PRICE_PER_MQ, 0));
  if (proj === 'sorriso')    return Math.round(BOXES_SORRISO.reduce((s,b) => s + parseFloat(b.mq.replace(',','.')) * BOX_PRICE_PER_MQ, 0));
  if (proj === 'audacia')    return Math.round(BOXES_AUDACIA.reduce((s,b) => s + parseFloat(b.mq.replace(',','.')) * BOX_PRICE_PER_MQ, 0));
  return 0;
}

function parseSL(sl) {
  if (!sl || sl === '—') return 0;
  return parseFloat(String(sl).replace(',','.')) || 0;
}

function projStats(key) {
  const p   = D[key];
  const all = Object.values(p.units);
  const res = all.filter(u=>u.st!=='locale');
  const loc = all.filter(u=>u.st==='locale');
  const v   = res.filter(u=>u.st==='venduto');
  const r   = res.filter(u=>u.st==='riservato');
  const d   = res.filter(u=>u.st==='disponibile');
  const tot = res.length;
  const eur  = u => parseFloat((u.price||'').replace(/\./g,'').replace(',','.')) || 0;
  const prev = u => Math.round(parseSL(u.sl) * PRICE_PER_MQ);
  const ricavi       = v.reduce((s,u)=>s+eur(u),0);
  const prevTotRes   = res.reduce((s,u)=>s+prev(u),0);
  const prevTotAll   = all.reduce((s,u)=>s+prev(u),0) + calcBoxRevenue(key);
  const prevVenduti  = v.reduce((s,u)=>s+prev(u),0);
  const acq = [...v,...r].filter(u=>u.accordo==='Acquisto');
  const per = [...v,...r].filter(u=>u.accordo==='Permuta');
  const tra = [...v,...r].filter(u=>u.accordo==='In trattativa');
  const boxN = [...v,...r].filter(u=>u.box).length;
  const drv  = [...v,...r].filter(u=>u.drive).length;
  const vConPrezzo = v.filter(u=>eur(u)>0);
  const deltaV = vConPrezzo.reduce((s,u)=>s+(eur(u)-prev(u)),0);
  // Ricavi per tipo accordo
  const ricaviAcquisto = v.filter(u=>u.accordo==='Acquisto').reduce((s,u)=>s+eur(u),0);
  const ricaviPermuta  = v.filter(u=>u.accordo==='Permuta').reduce((s,u)=>s+prev(u),0); // valore previsionale
  const nAcq = v.filter(u=>u.accordo==='Acquisto').length;
  const nPer = v.filter(u=>u.accordo==='Permuta').length;
  return {
    key, name:p.name, sub:p.sub, units: all,
    totAll: all.length, tot, v:v.length, r:r.length, d:d.length, loc:loc.length,
    ricavi, prevTotRes, prevTotAll, prevVenduti,
    deltaV, vConPrezzo: vConPrezzo.length,
    acq:acq.length, per:per.length, tra:tra.length, boxN, drv,
    ricaviAcquisto, ricaviPermuta, nAcq, nPer
  };
}

// Formatta stringa prezzo con separatore migliaia italiano: "310000" → "310.000"
function formatPriceDisplay(str) {
  if (!str) return '';
  const n = parseFloat(String(str).replace(/\./g,'').replace(',','.'));
  if (isNaN(n)) return str;
  return n.toLocaleString('it-IT', {maximumFractionDigits:0});
}
// Rimuove formattazione per salvare: "310.000" → "310000"
function parsePriceInput(str) {
  return String(str).replace(/\./g,'').replace(',','').trim();
}

function fmtEur(n) {
  return n!==0 ? '€ '+Math.abs(n).toLocaleString('it-IT') : '—';
}
function fmtN(n) { return n.toLocaleString('it-IT'); }

        <td style="text-align:right">${prev>0?'€ '+fmtN(prev):'—'}</td>
        <td style="text-align:right">${conc>0?'€ '+fmtN(conc):'<span class="delta-nd">—</span>'}</td>
        <td style="text-align:right">${dCell}</td>
        <td><span class="badge-sm ${u.st}">${STLBL[u.st]||u.st}</span>${u.owner?`<br><span style="font-size:10px;color:#666">${esc(u.owner)}</span>`:''}</td>
      </tr>`;
    }).join('');

    return `
    <div class="ptable-wrap">
      <div class="ptable-head">
        <div><h3>${p.name}</h3><p>Base previsionale: €${PRICE_PER_MQ.toLocaleString('it-IT')}/mq · ${Object.keys(p.units).length} unità totali</p></div>
      </div>
      <div style="overflow-x:auto">
      <table class="ptable">
        <thead><tr>
          <th>Piano</th><th>Scala</th><th>Int.</th><th>Tipologia</th>
          <th style="text-align:right">S.L. (mq)</th>
          <th style="text-align:right">Prev. €/mq</th>
          <th style="text-align:right">Concordato</th>
          <th style="text-align:right">Delta</th>
          <th>Stato / Acquirente</th>
        </tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr>
          <td colspan="5">TOTALE</td>
          <td style="text-align:right">€ ${fmtN(totPrev)}</td>
          <td style="text-align:right">${totConc?'€ '+fmtN(totConc):'—'}</td>
          <td style="text-align:right">${nConc?`<span class="${totDelta>=0?'delta-pos':'delta-neg'}">${totDelta>=0?'+':'−'} € ${fmtN(Math.abs(totDelta))}</span>`:'—'}</td>
          <td></td>
        </tr></tfoot>
      </table>
      </div>
    </div>`;
  }).join('');

  // ── SAL per cliente ──
  const allUnitsFlat = keys.flatMap(key =>
    Object.entries(D[key].units)
      .filter(([,u]) => u.sal && u.sal.length > 0)
      .map(([uid,u]) => ({uid, u, proj: D[key].name}))
  );

  const salRows = allUnitsFlat.map(({uid,u,proj:pName}) => {
    const sal = u.sal || [];
    const tot = sal.reduce((s,r)=>s+(parseFloat(r.importo)||0),0);
    const inc = sal.filter(r=>r.incassato).reduce((s,r)=>s+(parseFloat(r.importo)||0),0);
    const att = tot - inc;
    const pct = tot>0 ? Math.round(inc/tot*100) : 0;
    const next = sal.find(r=>!r.incassato && r.dataPrev);
    const pillCls = inc===tot&&tot>0?'inc':att>0?'att':'no';
    const pillTxt = inc===tot&&tot>0?'✓ Saldato':att>0?`Attesi: € ${att.toLocaleString('it-IT')}`:'—';
    return `<div class="cf-client-row">
      <div style="min-width:160px">
        <div style="font-weight:700;font-size:13px">${esc(u.owner||uid)}</div>
        <div style="font-size:10px;color:#999">${pName} · ${u.tipo||''} · Int. ${u.lbl}</div>
      </div>
      <div style="flex:1;min-width:160px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <div style="font-size:11px;color:#666">€ ${inc.toLocaleString('it-IT')} / € ${tot.toLocaleString('it-IT')}</div>
          <span class="cf-pill ${pillCls}">${pillTxt}</span>
        </div>
        <div class="dbar-wrap"><div class="dbar-fill" style="width:${pct}%;background:var(--green)"></div></div>
      </div>
      <div style="min-width:130px;text-align:right;font-size:11px;color:#888">
        ${next?`Prossima: <strong>${next.dataPrev.split('-').reverse().join('/')}</strong><br>€ ${(parseFloat(next.importo)||0).toLocaleString('it-IT')}`:'—'}
      </div>
    </div>`;
  }).join('');

  // ── Cash flow mensile ──
  const cfMap = {};
  allUnitsFlat.forEach(({u}) => {
    (u.sal||[]).forEach(r => {
      const dt = r.incassato ? r.dataInc : r.dataPrev;
      if (!dt) return;
      const ym = dt.slice(0,7); // YYYY-MM
      cfMap[ym] = (cfMap[ym]||0) + (parseFloat(r.importo)||0);
    });
  });
  const cfKeys = Object.keys(cfMap).sort();
  const cfMax = Math.max(...Object.values(cfMap), 1);
  let cumul = 0;
  const cfBars = cfKeys.map(ym => {
    const v = cfMap[ym];
    cumul += v;
    const pct = Math.round(v/cfMax*100);
    const [y,m] = ym.split('-');
    const mName = new Date(y,m-1).toLocaleString('it-IT',{month:'short',year:'2-digit'});
    return `<div class="cf-bar-row">
      <div class="cf-bar-lbl">${mName}</div>
      <div class="cf-bar-track"><div class="cf-bar-fill" style="width:${pct}%;background:#3a5fa0">€ ${v.toLocaleString('it-IT')}</div></div>
      <div class="cf-bar-val">cum. € ${cumul.toLocaleString('it-IT')}</div>
    </div>`;
  }).join('');

  // ── Previsione incassi ──
  const today = new Date(); today.setHours(0,0,0,0);
  let totPianificato=0, totIncassato=0, totConData=0, totSenzaData=0;
  const prossimi = []; // pagamenti futuri non incassati

  allUnitsFlat.forEach(({uid, u, proj: pName}) => {
    (u.sal||[]).forEach(r => {
      const imp = parseFloat(r.importo)||0;
      totPianificato += imp;
      if (r.incassato) {
        totIncassato += imp;
      } else if (r.dataPrev) {
        totConData += imp;
        const d = new Date(r.dataPrev);
        prossimi.push({ data:d, dataTxt: r.dataPrev.split('-').reverse().join('/'), label: r.label||'', importo: imp, owner: u.owner||uid, proj: pName, scaduto: d < today });
      } else {
        totSenzaData += imp;
      }
    });
  });
  prossimi.sort((a,b) => a.data - b.data);

  // previsione mensile futura
  const prevMap = {};
  prossimi.forEach(r => {
    const ym = r.data.toISOString().slice(0,7);
    prevMap[ym] = (prevMap[ym]||0) + r.importo;
  });
  const prevKeys = Object.keys(prevMap).sort();
  const prevMax  = Math.max(...Object.values(prevMap), 1);
  let prevCumul  = totIncassato;
  const prevBars = prevKeys.map(ym => {
    const v = prevMap[ym];
    prevCumul += v;
    const pct = Math.round(v/prevMax*100);
    const [y,m] = ym.split('-');
    const mName = new Date(y,m-1).toLocaleString('it-IT',{month:'short',year:'2-digit'});
    const isScaduto = new Date(ym+'-01') < today;
    return `<div class="cf-bar-row">
      <div class="cf-bar-lbl">${mName}</div>
      <div class="cf-bar-track"><div class="cf-bar-fill" style="width:${pct}%;background:${isScaduto?'#c62828':'#2e7d32'}">€ ${v.toLocaleString('it-IT')}</div></div>
      <div class="cf-bar-val" style="color:${isScaduto?'#c62828':'var(--navy)'}">cum. € ${prevCumul.toLocaleString('it-IT')}</div>
    </div>`;
  }).join('');

  const prossimiRows = prossimi.slice(0,20).map(r => {
    const cls = r.scaduto ? 'color:#c62828;font-weight:700' : 'color:#333';
    const badge = r.scaduto ? '<span style="background:#ffebee;color:#c62828;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:4px;">SCADUTO</span>' : '';
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0e8dc;gap:8px;flex-wrap:wrap;">
      <div style="min-width:90px;font-size:12px;font-weight:700;${cls}">${r.dataTxt}${badge}</div>
      <div style="flex:1;min-width:140px;">
        <div style="font-size:12px;font-weight:700;color:#1a2e4a;">${esc(r.owner)}</div>
        <div style="font-size:10px;color:#999;">${r.proj} · ${esc(r.label)}</div>
      </div>
      <div style="font-size:13px;font-weight:800;color:#2e7d32;">€ ${r.importo.toLocaleString('it-IT')}</div>
    </div>`;
  }).join('');

  const previsioneHtml = allUnitsFlat.length ? `
  <div>
    <div class="dash-section-title">📅 Previsione Incassi SAL</div>
    <div class="cf-wrap" style="margin-bottom:16px;">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:20px;">
        <div style="background:var(--bg);border-radius:8px;padding:12px 16px;">
          <div style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:#999;margin-bottom:4px;">Totale SAL Pianificato</div>
          <div style="font-size:18px;font-weight:800;color:#1a2e4a;">€ ${totPianificato.toLocaleString('it-IT')}</div>
        </div>
        <div style="background:#e8f5e9;border-radius:8px;padding:12px 16px;">
          <div style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:#999;margin-bottom:4px;">Già Incassato</div>
          <div style="font-size:18px;font-weight:800;color:#2e7d32;">€ ${totIncassato.toLocaleString('it-IT')}</div>
          <div style="font-size:10px;color:#999;">${totPianificato>0?Math.round(totIncassato/totPianificato*100):0}% del totale</div>
        </div>
        <div style="background:#fff3e0;border-radius:8px;padding:12px 16px;">
          <div style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:#999;margin-bottom:4px;">Da Incassare (con data)</div>
          <div style="font-size:18px;font-weight:800;color:#e65100;">€ ${totConData.toLocaleString('it-IT')}</div>
          <div style="font-size:10px;color:#999;">${prossimi.length} rata/e programmate</div>
        </div>
        <div style="background:#fafafa;border:1px solid #eee;border-radius:8px;padding:12px 16px;">
          <div style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:#999;margin-bottom:4px;">Da Pianificare (senza data)</div>
          <div style="font-size:18px;font-weight:800;color:#888;">€ ${totSenzaData.toLocaleString('it-IT')}</div>
        </div>
      </div>
      ${prossimi.length ? `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;flex-wrap:wrap;">
        <div>
          <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:#999;margin-bottom:10px;">Prossimi Incassi</div>
          ${prossimiRows}
          ${prossimi.length>20?`<div style="font-size:11px;color:#999;padding-top:8px;">... e altri ${prossimi.length-20} pagamenti</div>`:''}
        </div>
        <div>
          <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:#999;margin-bottom:10px;">Previsione Mensile <span style="color:#c62828;">■</span> scaduto <span style="color:#2e7d32;">■</span> futuro</div>
          ${prevBars||'<p style="color:#999;font-size:12px;">Nessuna data prevista inserita.</p>'}
        </div>
      </div>` : '<p style="color:#999;font-size:13px;padding:8px 0">Nessuna rata futura programmata. Aggiungi date previste nelle schede SAL.</p>'}
    </div>
  </div>` : '';

  const salSection = `
  ${previsioneHtml}
  <div>
    <div class="dash-section-title">SAL per Cliente</div>
    <div class="cf-wrap">
      ${allUnitsFlat.length ? salRows : '<p style="color:#999;font-size:13px;padding:16px 0">Nessun SAL inserito. Apri la scheda di un appartamento → tab SAL / Pagamenti.</p>'}
    </div>
  </div>
  <div>
    <div class="dash-section-title">Cash Flow — Entrate nel Tempo</div>
    <div class="cf-wrap">
      ${cfKeys.length ? cfBars : '<p style="color:#999;font-size:13px;padding:16px 0">Nessun dato disponibile. Inserisci le date nelle schede SAL.</p>'}
    </div>
  </div>`;

  document.getElementById('content').innerHTML = `
  <div class="dash">
    <div>
      <div class="dash-section-title">Analisi per Progetto</div>
      <div class="dash-grid">${cards}</div>
    </div>
    <div>
      <div class="dash-section-title">Riepilogo Generale</div>
      <div class="dash-grid">${globalCard}</div>
    </div>
    ${salSection}
    <div>
      <div class="dash-section-title">Prezzi Previsionali vs Concordati — Dettaglio per Unità</div>
      <div style="display:flex;flex-direction:column;gap:20px;">${tables}</div>
    </div>
  </div>`;
}

// ─── HISTORY HELPERS ───
function tsNow() {
  const n = new Date();
  return n.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'}) + ' ' +
         n.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
}

function renderHistory(u) {
  const hist = u.history || [];
  const el = document.getElementById('hist-list');
  document.getElementById('hist-count').textContent = hist.length ? `${hist.length} modifica${hist.length>1?'e':''}` : '';
  if (!hist.length) {
    el.innerHTML = '<div class="history-empty">Nessuna modifica registrata.</div>';
    return;
  }
  // show newest first
  el.innerHTML = [...hist].reverse().map(entry => {
    const changes = entry.changes.map(c => {
      const fromTxt = c.from ? `<span class="from">${esc(c.from)}</span>` : `<span class="empty">vuoto</span>`;
      const toTxt   = c.to   ? `<span class="to">${esc(c.to)}</span>`     : `<span class="empty">vuoto</span>`;
      return `<div class="hist-change"><strong>${FLBL[c.field]||c.field}:</strong> ${fromTxt} → ${toTxt}</div>`;
    }).join('');
    return `<div class="hist-entry"><div class="hist-ts">🕐 ${entry.ts}</div>${changes}</div>`;
  }).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── OPEN MODAL ───
function openM(uid) {
  curId = uid;
  const u = D[proj].units[uid], p = D[proj];
  document.getElementById('mt').textContent = `${p.name} – Scala ${u.sc} / Int. ${u.lbl}`;
  document.getElementById('ms').textContent = `${u.tipo} · S.L. ${u.sl} mq`;
  document.getElementById('mi').innerHTML = `
    <span class="chip" style="background:#1a2e4a;color:#fff;font-weight:700;font-size:13px">🔑 Codice: <strong>${uid}</strong></span>
    <span class="chip">Progetto: <strong>${p.name}</strong></span>
    <span class="chip">Scala: <strong>${u.sc||'—'}</strong></span>
    <span class="chip">Int. N°: <strong>${u.lbl}</strong></span>
    <span class="chip">Tipologia: <strong>${u.tipo}</strong></span>
    <span class="chip">S.L.: <strong>${u.sl} mq</strong></span>
  `;
  curIsLocale = false;
  document.getElementById('fst').value   = u.st;
  document.getElementById('fst').disabled = false;
  document.getElementById('fow').value   = u.owner   || '';
  document.getElementById('fcod').value  = u.codice  || '';
  document.getElementById('fph').value   = u.phone   || '';
  document.getElementById('fem').value   = u.email   || '';
  document.getElementById('fpr').value   = formatPriceDisplay(u.price);
  document.getElementById('fda').value   = u.date    || '';
  document.getElementById('fbx').value   = u.box     || '';
  document.getElementById('fac').value   = u.accordo || '';
  document.getElementById('fno').value   = u.notaio  || '';
  document.getElementById('fdr').value   = u.drive   || '';
  document.getElementById('fnt').value   = u.notes   || '';
  const drBtn = document.getElementById('fdr-btn');
  if (u.drive) { drBtn.href = u.drive; drBtn.style.display = 'inline-block'; }
  else drBtn.style.display = 'none';
  // ── ricavi previsionali ──
  const sl      = parseSL(u.sl);
  const prevEur = sl > 0 ? Math.round(sl * PRICE_PER_MQ) : 0;
  const concEur = parseFloat((u.price||'').replace(/\./g,'').replace(',','.')) || 0;
  const delta   = prevEur > 0 && concEur > 0 ? concEur - prevEur : null;
  const deltaHtml = delta !== null
    ? `<div class="mprev-box"><div class="mprev-lbl">Delta</div>
       <div class="mprev-val ${delta>=0?'delta-pos':'delta-neg'}">${delta>=0?'+':'−'} € ${Math.abs(delta).toLocaleString('it-IT')}</div></div>`
    : '';
  document.getElementById('mprev').innerHTML = `
    <div class="mprev-box">
      <div class="mprev-lbl">📐 Prezzo previsionale (${sl > 0 ? sl.toLocaleString('it-IT',{minimumFractionDigits:2}) : '—'} mq × €${PRICE_PER_MQ.toLocaleString('it-IT')})</div>
      <div class="mprev-val">${prevEur > 0 ? '€ ' + prevEur.toLocaleString('it-IT') : '—'}</div>
    </div>
    <div class="mprev-box">
      <div class="mprev-lbl">💶 Prezzo concordato</div>
      <div class="mprev-val gold">${concEur > 0 ? '€ ' + concEur.toLocaleString('it-IT') : '—'}</div>
    </div>
    ${deltaHtml}`;
  document.getElementById('msaved').style.display = 'none';
  rb();
  renderHistory(u);
  switchMTab('scheda');
  setFormLocked(curIsLocale); // locale → bloccato, tutti gli altri → subito modificabile
  document.getElementById('ov').classList.add('open');
}

function setFormLocked(locked) {
  // tutti i campi tranne fst (stato) che gestiamo separatamente
  const fields = ['fow','fcod','fph','fem','fpr','fda','fbx','fac','fno','fdr','fnt'];
  fields.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.disabled = locked;
    el.style.background = locked ? '#f5f5f5' : '';
    el.style.color = locked ? '#555' : '';
    el.style.cursor = locked ? 'default' : '';
  });
  // campo Stato: bloccato solo per i locali commerciali, sempre libero per tutti gli altri
  const fst = document.getElementById('fst');
  if (fst) {
    fst.disabled = curIsLocale;
    fst.style.background = curIsLocale ? '#f5f5f5' : '';
    fst.style.color = curIsLocale ? '#555' : '';
    fst.style.cursor = curIsLocale ? 'default' : '';
  }
  // Drive button
  const drBtn = document.getElementById('fdr-btn');
  if (drBtn) drBtn.style.pointerEvents = locked ? 'none' : '';
  // footer buttons
  document.getElementById('btn-edit').style.display   = locked  ? 'inline-flex' : 'none';
  document.getElementById('btn-cancel').style.display = !locked ? 'inline-flex' : 'none';
  document.getElementById('btn-save').style.display   = !locked ? 'inline-flex' : 'none';
  // refresh SAL tab if visible
  const salTab = document.getElementById('tab-sal');
  if (salTab && salTab.style.display !== 'none') renderSalTab();
  const addSalBtn = document.getElementById('btn-add-sal');
  if (addSalBtn) addSalBtn.style.display = locked ? 'none' : 'inline-block';
  // overlay click to close only when locked
  document.getElementById('ov').onclick = locked ? ovc : null;
}

function unlockForm() {
  setFormLocked(false);
  // forza abilitazione stato per appartamenti non-locale
  if (!curIsLocale) {
    const fst = document.getElementById('fst');
    if (fst) { fst.disabled = false; fst.style.background=''; fst.style.color=''; fst.style.cursor=''; }
  }
}

function rb() {
  const v = document.getElementById('fst').value;
  const b = document.getElementById('mb');
  b.textContent = STLBL[v]||v; b.className='badge '+v;
}

document.addEventListener('input', e => {
  if (e.target.id==='fpr' && curId) {
    const u = D[proj].units[curId];
    const sl = parseSL(u.sl), prevEur = sl>0?Math.round(sl*PRICE_PER_MQ):0;
    // Formatta con separatore migliaia mentre si digita
    const raw = e.target.value.replace(/\./g,'').replace(/[^0-9]/g,'');
    if (raw !== '') {
      const cursor = e.target.selectionStart;
      const formatted = parseInt(raw,10).toLocaleString('it-IT');
      e.target.value = formatted;
      // Riposiziona il cursore tenendo conto dei punti aggiunti
      const diff = formatted.length - (e.target.value.length);
      try { e.target.setSelectionRange(cursor + (formatted.length - raw.length), cursor + (formatted.length - raw.length)); } catch(_){}
    }
    const concEur = parseFloat(raw) || 0;
    const delta = prevEur>0 && concEur>0 ? concEur-prevEur : null;
    const box2 = document.getElementById('mprev').children[1];
    if (box2) box2.querySelector('.mprev-val').textContent = concEur>0 ? '€ '+concEur.toLocaleString('it-IT') : '—';
    const existing = document.getElementById('mprev').children[2];
    const deltaHtml = delta!==null
      ? `<div class="mprev-box"><div class="mprev-lbl">Delta</div><div class="mprev-val ${delta>=0?'delta-pos':'delta-neg'}">${delta>=0?'+':'−'} € ${Math.abs(delta).toLocaleString('it-IT')}</div></div>`
      : '';
    if (existing) existing.outerHTML = deltaHtml;
    else if (deltaHtml) document.getElementById('mprev').insertAdjacentHTML('beforeend', deltaHtml);
  }
  if (e.target.id==='fdr') {
    const drBtn = document.getElementById('fdr-btn');
    const v = e.target.value.trim();
    drBtn.href = v||'#'; drBtn.style.display = v ? 'inline-block' : 'none';
  }
});

// ─── MODAL TABS ───
function switchMTab(tab) {
  document.getElementById('tab-scheda').style.display = tab==='scheda' ? '' : 'none';
  document.getElementById('tab-sal').style.display    = tab==='sal'    ? '' : 'none';
  document.getElementById('tab-btn-scheda').classList.toggle('active', tab==='scheda');
  document.getElementById('tab-btn-sal').classList.toggle('active', tab==='sal');
  if (tab==='sal') renderSalTab();
}

// ─── SAL ───
function renderSalTab() {
  if (!curId) return;
  const u = D[proj].units[curId];
  const sal = u.sal || [];
  const locked = document.getElementById('btn-edit').style.display !== 'none';

  // summary
  const tot  = sal.reduce((s,r)=>s+(parseFloat(r.importo)||0),0);
  const inc  = sal.filter(r=>r.incassato).reduce((s,r)=>s+(parseFloat(r.importo)||0),0);
  const att  = tot - inc;
  document.getElementById('sal-summary').innerHTML = `
    <div class="sal-sbox"><div class="sl">Totale contratto SAL</div><div class="sv">${tot>0?'€ '+tot.toLocaleString('it-IT'):'—'}</div></div>
    <div class="sal-sbox inc"><div class="sl">Incassato</div><div class="sv">${inc>0?'€ '+inc.toLocaleString('it-IT'):'—'}</div></div>
    <div class="sal-sbox att"><div class="sl">Da incassare</div><div class="sv">${att>0?'€ '+att.toLocaleString('it-IT'):'—'}</div></div>`;

  // rows
  const tbody = document.getElementById('sal-tbody');
  tbody.innerHTML = sal.map((r,i)=>`
    <tr id="sal-row-${i}">

function salField(i, key, val) {
  if (!curId) return;
  const u = D[proj].units[curId];
  if (!u.sal) u.sal = [];
  if (!u.sal[i]) u.sal[i] = {};
  u.sal[i][key] = key==='incassato' ? !!val : (key==='importo' ? parseFloat(val)||0 : val);
  // refresh summary only
  const sal = u.sal;
  const tot = sal.reduce((s,r)=>s+(parseFloat(r.importo)||0),0);
  const inc = sal.filter(r=>r.incassato).reduce((s,r)=>s+(parseFloat(r.importo)||0),0);
  const att = tot - inc;
  document.getElementById('sal-summary').innerHTML = `
    <div class="sal-sbox"><div class="sl">Totale contratto SAL</div><div class="sv">${tot>0?'€ '+tot.toLocaleString('it-IT'):'—'}</div></div>
    <div class="sal-sbox inc"><div class="sl">Incassato</div><div class="sv">${inc>0?'€ '+inc.toLocaleString('it-IT'):'—'}</div></div>
    <div class="sal-sbox att"><div class="sl">Da incassare</div><div class="sv">${att>0?'€ '+att.toLocaleString('it-IT'):'—'}</div></div>`;
  store();
}

function save() {
  if (!curId) return;
  const u = D[proj].units[curId];

  // snapshot before
  const before = {
    st: u.st==='locale' ? 'locale' : u.st,
    owner: u.owner||'', price: u.price||'', phone: u.phone||'',
    email: u.email||'', date: u.date||'', box: u.box||'',
    accordo: u.accordo||'', notaio: u.notaio||'', drive: u.drive||'', notes: u.notes||''
  };

  // apply new values
  u.st = document.getElementById('fst').value;
  u.owner   = document.getElementById('fow').value.trim();
  u.codice  = document.getElementById('fcod').value.trim();
  u.phone   = document.getElementById('fph').value.trim();
  u.email   = document.getElementById('fem').value.trim();
  u.price   = parsePriceInput(document.getElementById('fpr').value);
  u.date    = document.getElementById('fda').value;
  u.box     = document.getElementById('fbx').value.trim();
  u.accordo = document.getElementById('fac').value;
  u.notaio  = document.getElementById('fno').value.trim();
  u.drive   = document.getElementById('fdr').value.trim();
  u.notes   = document.getElementById('fnt').value.trim();

  // build diff
  const after = {
    st: u.st, owner: u.owner, price: u.price, phone: u.phone,
    email: u.email, date: u.date, box: u.box,
    accordo: u.accordo, notaio: u.notaio, drive: u.drive, notes: u.notes
  };
  const changes = [];
  Object.keys(after).forEach(f => {
    if ((before[f]||'') !== (after[f]||'')) {
      changes.push({field: f, from: before[f]||'', to: after[f]||''});
    }
  });

  if (changes.length) {
    if (!Array.isArray(u.history)) u.history = [];
    u.history.push({ts: tsNow(), changes});
  }

  store(); renderKPI(); renderPlan(); renderHistory(u); renderCheckPanel(proj);
  setFormLocked(true);
  document.getElementById('msaved').style.display = 'inline';
  setTimeout(()=>{ document.getElementById('msaved').style.display='none'; }, 2000);
}

let xlsxTotali = null;

function handleXlsxUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1});
      let hdrIdx=-1, colPartita=-1, colTotale=-1, colTipo=-1;
      for (let i=0; i<rows.length; i++) {
        const pi = rows[i].indexOf('Partita');
        if (pi !== -1) {
          hdrIdx=i; colPartita=pi;
          colTipo   = rows[i].indexOf('Cliente / Fornitore');
          colTotale = rows[i].indexOf('Totale Partita');
          break;
        }
      }
      if (hdrIdx === -1) { alert('Formato non riconosciuto. Usa l\'estrazione "Situazione Scadenze" dal gestionale.'); return; }
      const totali = {};
      for (let i=hdrIdx+1; i<rows.length; i++) {
        const r = rows[i];
        if (!r || !r.length) continue;
        const tipo = r[colTipo], partita = r[colPartita], tot = parseFloat(r[colTotale])||0;
        if (tipo==='Cliente' && partita && String(partita).startsWith('DP')) {
          const cod = String(partita).trim();
          totali[cod] = (totali[cod]||0) + tot;
        }
      }
      xlsxTotali = totali;
      renderIncassi();
    } catch(err) { alert('Errore lettura file: '+err.message); }
  };
  reader.readAsArrayBuffer(file);
}

function fmtEurInc(n) {
  if (n===null||n===undefined) return '—';
  return new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n);
}

// ─── CHECK PANEL (inline per progetto) ───
let _cpOpen = false;
function renderCheckPanel(p) {
  const panel = document.getElementById('check-panel');
  if (!p || !D[p]) { panel.innerHTML = ''; return; }

  const RULES = [
    { field:'owner', label:'Proprietario' },
    { field:'price', label:'Prezzo'       },
    { field:'drive', label:'Link Drive'   },
  ];
  const floorOf = {};
  D[p].floors.forEach(f => { f.layout.forEach(g => { g.ids.forEach(uid => { floorOf[uid]=f.name; }); }); });

  const issues = Object.entries(D[p].units)
    .filter(([,u]) => u.st === 'venduto')
    .map(([uid,u]) => {
      const missing = RULES.filter(r => !u[r.field]||!String(u[r.field]).trim()).map(r=>r.label);
      return missing.length ? {uid,u,missing,floor:floorOf[uid]||''} : null;
    }).filter(Boolean);

  if (!issues.length) {
    panel.innerHTML = `<div class="cp-header" style="cursor:default;">
      <span class="cp-badge ok">✅ Tutte le schede vendute sono complete</span>
    </div>`;
    return;
  }

  const rows = issues.map(({uid,u,missing,floor}) => {
    const pills = missing.map(m=>`<span class="cp-pill">${esc(m)}</span>`).join('');
    return `<div class="cp-row" onclick="openM('${uid}')">
      <span style="color:#888;min-width:90px;">${esc(floor)}</span>
      <span style="font-weight:700;min-width:60px;">Sc.${esc(u.sc||'—')} Int.${esc(u.lbl)}</span>
      <span style="color:#666;min-width:100px;">${u.owner?esc(u.owner):'<em style="color:#bbb">—</em>'}</span>
      <div class="cp-pills">${pills}</div>
      <span style="margin-left:auto;font-size:11px;color:#3a5fa0;">↗ Apri</span>
    </div>`;
  }).join('');

  const open = _cpOpen;
  panel.innerHTML = `
    <div class="cp-header" onclick="toggleCP()">
      <span class="cp-badge warn">⚠️ ${issues.length} unità vendute da completare</span>
      <span class="cp-toggle" id="cp-arrow">${open?'▲':'▼'}</span>
    </div>
    <div class="cp-body" id="cp-body" style="display:${open?'block':'none'}">
      <div style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;">
        Campi obbligatori mancanti — clicca per aprire la scheda
      </div>
      ${rows}
    </div>`;
}

function toggleCP() {
  _cpOpen = !_cpOpen;
  const body = document.getElementById('cp-body');
  const arrow = document.getElementById('cp-arrow');
  if (body)  body.style.display  = _cpOpen ? 'block' : 'none';
  if (arrow) arrow.textContent   = _cpOpen ? '▲' : '▼';
}

// ─── CHECK COMPLETEZZA ───
function renderCheck() {
  const projKeys  = ['a1','a2','passione','vittoria','equilibrio','sorriso','audacia'];
  const projNames = {a1:'Armonia 1', a2:'Armonia 2', passione:'Passione', vittoria:'Vittoria', equilibrio:'Equilibrio ERS', sorriso:'Sorriso', audacia:'Audacia'};

  const RULES = [
    { field:'owner', label:'Proprietario / Acquirente' },
    { field:'price', label:'Prezzo Concordato (€)'     },
    { field:'drive', label:'Link Google Drive'          },
  ];

  let totalIssues = 0;
  const sections = [];

  projKeys.forEach(pk => {
    const p = D[pk];
    const issues = [];
    const floorOf = {};
    p.floors.forEach(f => { f.layout.forEach(g => { g.ids.forEach(uid => { floorOf[uid] = f.name; }); }); });

    Object.entries(p.units).forEach(([uid, u]) => {
      if (u.st !== 'venduto') return;
      const missing = RULES.filter(r => !u[r.field] || !String(u[r.field]).trim()).map(r => r.label);
      if (missing.length) { issues.push({ uid, u, missing, floor: floorOf[uid]||'' }); totalIssues++; }
    });
    sections.push({ pk, name: projNames[pk], issues });
  });

  const summaryColor = totalIssues===0 ? '#2e7d32' : '#c62828';
  const summaryBg    = totalIssues===0 ? '#e8f5e9' : '#ffebee';
  const summaryIcon  = totalIssues===0 ? '✅' : '⚠️';

  const sectionsHtml = sections.map(({ pk, name, issues }) => {
    if (!issues.length) {
      return `<div style="background:#fff;border-radius:12px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px;">
        <div style="background:#2e7d32;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:10px;">
          <span style="font-size:16px;">✅</span>
          <span style="font-size:14px;font-weight:800;">${name}</span>
          <span style="font-size:11px;opacity:.75;margin-left:4px;">— tutte le unità vendute sono complete</span>
        </div>
      </div>`;
    }
    const rows = issues.map(({ uid, u, missing, floor }) => {
      const pills = missing.map(m =>
        `<span style="background:#ffebee;color:#c62828;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-right:4px;white-space:nowrap;">${esc(m)}</span>`
      ).join('');
      return `<tr style="border-bottom:1px solid #f0e8dc;cursor:pointer;transition:background .15s;" onmouseover="this.style.background='#faf7f2'" onmouseout="this.style.background=''" onclick="sw('${pk}');setTimeout(()=>openM('${uid}'),200)">
        <td style="padding:9px 12px;font-size:12px;color:#888;">${esc(floor)}</td>
        <td style="padding:9px 12px;font-size:12px;font-weight:700;">${esc(u.sc||'—')}</td>
        <td style="padding:9px 12px;font-size:12px;">${esc(u.lbl)}</td>
        <td style="padding:9px 12px;font-size:12px;">${esc(u.tipo)}</td>
        <td style="padding:9px 12px;font-size:12px;">${u.owner?esc(u.owner):'<span style="color:#bbb;font-style:italic;">—</span>'}</td>
        <td style="padding:9px 12px;">${pills}</td>
        <td style="padding:9px 12px;font-size:11px;color:#3a5fa0;font-weight:700;">↗ Apri</td>
      </tr>`;
    }).join('');

    return `<div style="background:#fff;border-radius:12px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px;">
      <div style="background:var(--navy);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:14px;font-weight:800;">${name}</span>
        <span style="background:#c62828;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;">${issues.length} da completare</span>
      </div>
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;">
          <thead><tr style="background:#f5f0e8;">
            <th style="padding:8px 12px;text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#888;">Piano</th>
            <th style="padding:8px 12px;text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#888;">Scala</th>
            <th style="padding:8px 12px;text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#888;">Int.</th>
            <th style="padding:8px 12px;text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#888;">Tipologia</th>
            <th style="padding:8px 12px;text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#888;">Proprietario</th>
            <th style="padding:8px 12px;text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#888;">Campi Mancanti</th>
            <th style="padding:8px 12px;"></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
  <div style="padding:24px;max-width:960px;margin:0 auto;">
    <h2 style="font-size:20px;font-weight:800;color:var(--navy);margin-bottom:6px;">⚠️ Completezza Schede</h2>
    <p style="font-size:13px;color:#666;margin-bottom:20px;">Unità vendute con campi obbligatori mancanti. Clicca su una riga per aprire direttamente la scheda.</p>
    <div style="background:${summaryBg};border-radius:12px;padding:16px 24px;margin-bottom:24px;display:flex;align-items:center;gap:12px;">
      <span style="font-size:28px;">${summaryIcon}</span>
      <div>
        <div style="font-size:16px;font-weight:800;color:${summaryColor};">
          ${totalIssues===0 ? 'Tutto in ordine! Tutte le schede sono complete.' : `${totalIssues} unit${totalIssues===1?'à':'à'} da completare su tutti i progetti`}
        </div>
        <div style="font-size:12px;color:#888;margin-top:2px;">Campi obbligatori per le unità vendute: Proprietario / Acquirente · Prezzo Concordato · Link Google Drive</div>
      </div>
    </div>
    ${sectionsHtml}
  </div>`;
}

// ─── INIT ───
load(); sw('lotti');
</script>
</body>
</html>
